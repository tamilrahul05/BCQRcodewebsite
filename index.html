<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolathur Babu Catering - Social Links</title>
    <meta name="description" content="Official social links for Kolathur Babu Catering. Connect with us on Instagram, YouTube, Facebook, and WhatsApp.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for brand icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Mobile-First Container -->
    <main class="linktree-container">
        
        <!-- Logo Card with Logo (Left) and Baba (Right) -->
        <header class="logo-card animate-fade-in">
            <!-- Logo wrapper for brand (Left) -->
            <div class="logo-wrapper-header">
                <img id="display-logo" class="brand-logo-img" src="assets/logo.png" alt="Kolathur Babu Catering Logo">
            </div>
            
            <div class="header-row-divider"></div>
            
            <!-- Circular avatar wrapper for Baba (Right) -->
            <div class="avatar-wrapper">
                <img id="display-baba" class="baba-img" src="assets/baba.png" alt="Sai Baba">
            </div>
        </header>

        <!-- Social Links Stack -->
        <section class="links-stack animate-slide-up">
            
            <!-- Instagram Row -->
            <a href="https://www.instagram.com/babucatering?igsh=MXZzMmJlcmNzM2Iybg==" target="_blank" rel="noopener noreferrer" class="link-card" data-platform="instagram">
                <div class="left-box instagram-box">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="link-label">Instagram</div>
                <div class="right-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>

            <!-- YouTube Row -->
            <a href="https://youtube.com/@kolathurbabucatering?si=VXKdkmFPu189_lx-" target="_blank" rel="noopener noreferrer" class="link-card" data-platform="youtube">
                <div class="left-box youtube-box">
                    <i class="fa-brands fa-youtube"></i>
                </div>
                <div class="link-label">YouTube</div>
                <div class="right-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>

            <!-- Facebook Row -->
            <a href="https://www.facebook.com/share/1GyxpPyBRZ/" target="_blank" rel="noopener noreferrer" class="link-card" data-platform="facebook">
                <div class="left-box facebook-box">
                    <i class="fa-brands fa-facebook-f"></i>
                </div>
                <div class="link-label">Facebook</div>
                <div class="right-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>

            <!-- WhatsApp Row -->
            <a href="https://wa.me/919944769090" target="_blank" rel="noopener noreferrer" class="link-card" data-platform="whatsapp">
                <div class="left-box whatsapp-box">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div class="link-label">WhatsApp</div>
                <div class="right-arrow">
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </a>

        </section>
    </main>
</body>
</html>
