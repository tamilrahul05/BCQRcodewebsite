<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolathur Babu Catering - Social Links & QR Codes</title>
    <meta name="description" content="Official social links and QR codes for Kolathur Babu Catering. Connect with us on Instagram, YouTube, WhatsApp, and Facebook.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for brand icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Mobile-First Container -->
    <main class="linktree-container">
        
        <!-- Logo Card with Logo (Left) and Baba (Right) -->
        <header class="logo-card animate-fade-in">
            <!-- Logo wrapper for brand (Left) -->
            <div class="logo-wrapper-header">
                <div class="image-loading-spinner" id="spinner-logo"></div>
                <img id="display-logo" class="brand-logo-img hidden" alt="Kolathur Babu Catering Logo">
            </div>
            
            <div class="header-row-divider"></div>
            
            <!-- Circular avatar wrapper for Baba (Right) -->
            <div class="avatar-wrapper">
                <div class="image-loading-spinner" id="spinner-baba"></div>
                <img id="display-baba" class="baba-img hidden" alt="Sai Baba">
            </div>
        </header>

        <!-- Social Links Stack -->
        <section class="links-stack animate-slide-up">
            
            <!-- Instagram Row -->
            <div class="link-card" data-platform="instagram">
                <div class="left-box instagram-box">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <div class="link-label">Instagram</div>
                <div class="menu-btn-wrapper">
                    <button class="menu-trigger" aria-label="Options">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                    <!-- Dropdown Options -->
                    <div class="dropdown-menu">
                        <button class="dropdown-item opt-qr"><i class="fa-solid fa-qrcode"></i> Show QR Code</button>
                        <button class="dropdown-item opt-visit"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Profile</button>
                        <button class="dropdown-item opt-download"><i class="fa-solid fa-download"></i> Download QR</button>
                    </div>
                </div>
            </div>

            <!-- YouTube Row -->
            <div class="link-card" data-platform="youtube">
                <div class="left-box youtube-box">
                    <i class="fa-brands fa-youtube"></i>
                </div>
                <div class="link-label">YouTube</div>
                <div class="menu-btn-wrapper">
                    <button class="menu-trigger" aria-label="Options">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item opt-qr"><i class="fa-solid fa-qrcode"></i> Show QR Code</button>
                        <button class="dropdown-item opt-visit"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Channel</button>
                        <button class="dropdown-item opt-download"><i class="fa-solid fa-download"></i> Download QR</button>
                    </div>
                </div>
            </div>

            <!-- WhatsApp Row -->
            <div class="link-card" data-platform="whatsapp">
                <div class="left-box whatsapp-box">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <div class="link-label">WhatsApp</div>
                <div class="menu-btn-wrapper">
                    <button class="menu-trigger" aria-label="Options">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item opt-qr"><i class="fa-solid fa-qrcode"></i> Show QR Code</button>
                        <button class="dropdown-item opt-visit"><i class="fa-solid fa-arrow-up-right-from-square"></i> Chat on WhatsApp</button>
                        <button class="dropdown-item opt-download"><i class="fa-solid fa-download"></i> Download QR</button>
                    </div>
                </div>
            </div>

            <!-- Facebook Row -->
            <div class="link-card" data-platform="facebook">
                <div class="left-box facebook-box">
                    <i class="fa-brands fa-facebook-f"></i>
                </div>
                <div class="link-label">Facebook</div>
                <div class="menu-btn-wrapper">
                    <button class="menu-trigger" aria-label="Options">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item opt-qr"><i class="fa-solid fa-qrcode"></i> Show QR Code</button>
                        <button class="dropdown-item opt-visit"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Page</button>
                        <button class="dropdown-item opt-download"><i class="fa-solid fa-download"></i> Download QR</button>
                    </div>
                </div>
            </div>

        </section>

        <!-- Hidden container for generated QR codes in JS (Pre-rendered for instant downloads) -->
        <div class="hidden-qr-pool">
            <img id="qr-img-instagram" class="hidden">
            <img id="qr-img-youtube" class="hidden">
            <img id="qr-img-whatsapp" class="hidden">
            <img id="qr-img-facebook" class="hidden">
        </div>
    </main>

    <!-- Global QR Code Popup Modal -->
    <div class="modal-backdrop" id="qr-modal">
        <div class="modal-card">
            <button class="modal-close-btn" id="modal-close"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header">
                <div class="modal-platform-icon" id="modal-icon-box">
                    <!-- Dynamic platform icon injected by JS -->
                </div>
                <h3 id="modal-title">Instagram</h3>
                <p class="modal-subtitle">Scan to visit official page</p>
            </div>
            <div class="modal-body">
                <div class="modal-qr-container">
                    <div class="spinner" id="modal-spinner"></div>
                    <img id="modal-qr-img" alt="QR Code Preview">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-modal-visit" id="modal-visit-btn">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Visit Link
                </button>
                <button class="btn-modal btn-modal-download" id="modal-download-btn">
                    <i class="fa-solid fa-download"></i> Download QR Code
                </button>
            </div>
        </div>
    </div>

    <!-- Node-QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <!-- Custom JS -->
    <script src="app.js"></script>
</body>
</html>
